services:
  - type: web
    name: wangye-web
    runtime: static
    buildCommand: ./scripts/render_build.sh
    staticPublishPath: build/web
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: FLUTTER_VERSION
        value: 3.41.5
      - key: TONGXIN_API_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: FIREBASE_API_KEY
        sync: false
      - key: FIREBASE_APP_ID
        sync: false
      - key: FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_AUTH_DOMAIN
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: FIREBASE_MEASUREMENT_ID
        sync: false
      - key: AGORA_APP_ID
        sync: false
      - key: AGORA_TOKEN
        sync: false
      - key: POLYGON_API_KEY
        sync: false
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: APP_DOWNLOAD_URL
        sync: false
      - key: WEBVIEW_USER_PAGE_URL
        sync: false
      - key: LOCAL_DEV_MODE
        value: "false"
